name: mlip_md
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - numpy>=1.26
  - scipy>=1.12
  - pandas>=2.2
  - matplotlib>=3.8
  - tqdm>=4.66
  - ase>=3.23
  - h5py>=3.10
  - pip:
    # Core ML/MLIP packages — install the ones you want to use
    # MACE-MP-0
    - mace-torch>=0.3.6
    # CHGNet
    - chgnet>=0.3.8
    # SevenNet (comment out if not needed)
    # - sevenn>=0.9.0
    # Utilities
    - pymatgen>=2024.3.1
    - spglib>=2.4
    - click>=8.1
    - rich>=13.7
    - joblib>=1.3
